<!doctype html>
  <html lang="es">
  <head>
  <meta charset="UTF-8" />
  <title>Prueba minima</title>
  <style>
    html, body { margin:0; padding:0; height:100%; background:#222; }
  canvas { display:block; }
  #status {
        position:fixed; top:10px; left:10px; z-index:10;
    font-family: monospace; font-size:14px; color:#0f0;
    background:rgba(0,0,0,0.7); padding:8px 12px; white-space:pre-line;
}
</style>
  <script type="importmap">
  {
    "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
}
</script>
      </head>
      <body>
      <div id="status">cargando...</div>
      <script type="module">
        import * as THREE from "three";
        import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";

  const statusEl = document.getElementById("status");
  function log(msg) {
        console.log(msg);
    statusEl.textContent += "\n" + msg;
  }

  const MODEL_PATH = "assets/cad/sheetmetalbox2.glb";

  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.body.appendChild(renderer.domElement);

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x222222);

  const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.01, 1e6);

  window.addEventListener("resize", () => {
        renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
});

  log("iniciando GLTFLoader...");
  log("ruta: " + MODEL_PATH);

  const loader = new GLTFLoader();
  loader.load(
        MODEL_PATH,
        (gltf) => {
          log("modelo cargado OK");
      const root = gltf.scene;

      let meshCount = 0;
      root.traverse((o) => {
                if (o.isMesh) {
                  meshCount++;
          o.material = new THREE.MeshBasicMaterial({
                        color: 0xffffff,
            side: THREE.DoubleSide,
                        wireframe: false,
            });
      }
});
      log("mallas encontradas: " + meshCount);

      scene.add(root);

      const box = new THREE.Box3().setFromObject(root);
      const size = box.getSize(new THREE.Vector3());
      const center = box.getCenter(new THREE.Vector3());
      log("tamano: " + size.toArray().map(n => n.toFixed(2)).join(", "));
      log("centro: " + center.toArray().map(n => n.toFixed(2)).join(", "));

      root.position.sub(center);

      const maxDim = Math.max(size.x, size.y, size.z) || 1;
      const dist = maxDim * 2.2;
      camera.position.set(dist * 0.6, dist * 0.5, dist);
      camera.near = maxDim / 1000;
      camera.far = maxDim * 1000;
      camera.updateProjectionMatrix();
      camera.lookAt(0, 0, 0);

      log("camara colocada a distancia: " + dist.toFixed(2));
      log("LISTO");

      renderer.render(scene, camera);

      function animate() {
                requestAnimationFrame(animate);
        root.rotation.y += 0.01;
        renderer.render(scene, camera);
      }
      animate();
},
    (xhr) => {
      if (xhr.total) {
        log("cargando: " + Math.round((xhr.loaded / xhr.total) * 100) + "%");
      }
},
    (err) => {
      log("ERROR AL CARGAR: " + (err && err.message ? err.message : JSON.stringify(err)));
            console.error(err);
}
  );
</script>
  </body>
  </html>
